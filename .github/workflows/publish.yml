name: Publish Drafts to Live Site

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Publish message (optional)'
        required: false
        default: 'Publish content updates'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Check for changes in drafts
        id: check
        run: |
          git fetch origin drafts main
          CHANGES=$(git log origin/main..origin/drafts --oneline)
          if [ -z "$CHANGES" ]; then
            echo "No changes to publish"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes to publish:"
            echo "$CHANGES"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Rebase drafts onto latest main and merge
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Step 1: Checkout drafts branch
          git checkout drafts
          
          # Step 2: Rebase drafts onto latest main
          # This brings main's changes (e.g., v1.2) into drafts first,
          # then applies the CMS changes on top
          echo "🔄 Rebasing drafts onto latest main..."
          git rebase origin/main
          
          # Step 3: Force push the rebased drafts branch
          git push origin drafts --force-with-lease
          echo "✅ Drafts rebased onto main"
          
          # Step 4: Now fast-forward main to drafts
          # Since drafts is now ahead of main (contains main + CMS changes)
          git checkout main
          git merge drafts --ff-only
          
          # Step 5: Push the updated main branch
          git push origin main
          echo "✅ Main branch updated with drafts changes"
      
      - name: Sync drafts to main
        if: steps.check.outputs.has_changes == 'true'
        run: |
          # Both branches should now be at the same commit
          # This ensures they stay in sync
          git checkout drafts
          git reset --hard main
          git push origin drafts --force
          
          echo "✅ Drafts branch synced with main"
      
      - name: No changes message
        if: steps.check.outputs.has_changes == 'false'
        run: echo "Nothing to publish - drafts branch is up to date with main"

  deploy:
    needs: publish
    if: needs.publish.outputs.has_changes == 'true'
    uses: ./.github/workflows/deploy.yml
