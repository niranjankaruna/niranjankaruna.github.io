<section class="space-y-6">
  <div class="flex items-center gap-2">
    <input [(ngModel)]="q" placeholder="Search products & collections..." class="w-full px-4 py-2 rounded-xl border" />
    <span class="badge">{{filteredProducts.length + filteredCollections.length}} results</span>
  </div>

  <div class="grid md:grid-cols-2 gap-6">
    <div class="card">
      <h2 class="text-xl font-semibold mb-3">Products</h2>
      <ul class="space-y-2">
        <li *ngFor="let p of filteredProducts">
          <a [routerLink]="['/product', p.id]" class="text-brand-700 hover:underline">{{p.name}}</a>
          <span class="text-sm text-gray-600 ml-2" *ngIf="p.price">{{p.price | currency:p.currency}}</span>
        </li>
      </ul>
    </div>
    <div class="card">
      <h2 class="text-xl font-semibold mb-3">Collections</h2>
      <ul class="space-y-2">
        <li *ngFor="let p of filteredCollections">
          <a [routerLink]="['/collection', p.id]" class="text-brand-700 hover:underline">{{p.name}}</a>
        </li>
      </ul>
    </div>
  </div>
</section>
