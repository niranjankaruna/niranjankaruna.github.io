<!-- Hero Card (matches event list hero style) -->
<section class="hero" style="background-image: url('/assets/hero-bg.jpg')">
  <div class="media-overlay"></div>
  <span class="after"></span>

  <div class="hero-content">
    <h1>Explore Products</h1>
    <p>Browse decor items for your event</p>
  </div>

  <!-- Sparkles -->
  <div class="sparkle sparkle-1"></div>
  <div class="sparkle sparkle-3"></div>

  <!-- Soft Glows -->
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
</section>

<section class="app-page">
  <div class="app-grid">
    <article *ngFor="let product of products" class="app-card" [routerLink]="['/product', product.id]">
      <!-- Background image -->
      <div
        class="app-media"
        *ngIf="product.image"
        [ngStyle]="{ 'background-image': 'url(' + product.image + ')' }"
      ></div>
      <div
        class="app-media app-media-fallback"
        *ngIf="!product.image"
      ></div>

      <!-- dark overlay on image -->
      <div class="media-overlay"></div>

      <!-- animated caption -->
      <figcaption class="caption">
        <div class="show-cont">
          <h3 class="media-title">{{ product.name }}</h3>
          <p class="card-price" *ngIf="product.priceLabel">{{ product.priceLabel }}</p>
        </div>
      </figcaption>

      <!-- overlay gradient -->
      <span class="after"></span>
    </article>
  </div>
</section>
