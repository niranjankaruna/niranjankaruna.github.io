<section class="event-page">
  <!-- Event Header -->
  <div class="event-header" *ngIf="event">
    <div class="event-hero" *ngIf="event?.heroImage" [ngStyle]="{'background-image': 'url(' + event.heroImage + ')'}">
      <!-- Media overlay for darkening effect -->
      <div class="media-overlay"></div>
      <!-- Gradient overlay span for multiply blend effect -->
      <span class="after"></span>
      <!-- Hero content positioned at bottom left -->
      <div class="hero-content">
        <h1>{{event?.name}}</h1>
        <p>{{event?.summary}}</p>
      </div>
      <!-- Sparkles -->
      <div class="sparkle sparkle-1"></div>
      <div class="sparkle sparkle-2"></div>
      <div class="sparkle sparkle-3"></div>
      <!-- Soft Glows -->
      <div class="glow glow-1"></div>
      <div class="glow glow-2"></div>
    </div>
    <div class="event-hero event-hero-fallback" *ngIf="!event?.heroImage">
      <!-- Media overlay for darkening effect -->
      <div class="media-overlay"></div>
      <!-- Gradient overlay span for multiply blend effect -->
      <span class="after"></span>
      <!-- Hero content positioned at bottom left -->
      <div class="hero-content">
        <h1>{{event?.name}}</h1>
        <p>{{event?.summary}}</p>
      </div>
      <!-- Sparkles -->
      <div class="sparkle sparkle-1"></div>
      <div class="sparkle sparkle-2"></div>
      <div class="sparkle sparkle-3"></div>
      <!-- Soft Glows -->
      <div class="glow glow-1"></div>
      <div class="glow glow-2"></div>
    </div>
  </div>

  <!-- Collections Section -->
  <div class="packages-section" *ngIf="collections.length > 0">
    <h2 class="section-title">Available Collections</h2>
    <div class="app-grid">
      <article *ngFor="let p of collections" class="app-card" [routerLink]="['/collection', p.id]">
        <div
          class="app-media"
          *ngIf="p.tileImage"
          [ngStyle]="{ 'background-image': 'url(' + p.tileImage + ')' }"
        ></div>
        <div
          class="app-media app-media-fallback"
          *ngIf="!p.tileImage"
        ></div>

        <div class="media-overlay"></div>

        <figcaption class="caption">
          <div class="show-cont">
            <h3 class="media-title">{{ p.name }}</h3>
            <div class="tier-badges">
              <span class="tier-badge" *ngFor="let t of p.tiers">{{t.name}}: {{t.price | currency:t.currency}}</span>
            </div>
            <span class="explore-btn">View Collection</span>
          </div>
        </figcaption>

        <span class="after"></span>
      </article>
    </div>
  </div>

  <div class="no-packages" *ngIf="collections.length === 0 && event">
    <p>No collections available for this event type yet.</p>
    <a routerLink="/events" class="back-btn">← Back to Events</a>
  </div>
</section>
