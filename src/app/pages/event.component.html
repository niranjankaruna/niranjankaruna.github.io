<section class="space-y-6">
  <div class="relative h-64 rounded-xl overflow-hidden bg-gray-100" *ngIf="event?.tileImage">
    <img [src]="event.tileImage" [alt]="event.name" class="w-full h-full object-cover">
    <div class="absolute inset-0 bg-black/30 flex items-end p-6">
      <h1 class="text-4xl font-bold text-white">{{event?.name}}</h1>
    </div>
  </div>
  
  <div *ngIf="!event?.tileImage">
    <h1 class="text-3xl font-bold">{{event?.name}}</h1>
  </div>

  <p class="text-xl text-gray-700">{{event?.summary}}</p>

  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
    <a class="tile block" *ngFor="let p of packages" [routerLink]="['/package', p.slug]">
      <div class="aspect-[16/9] bg-gradient-to-br from-purple-200 to-blue-200 flex items-center justify-center text-white text-xl font-semibold overflow-hidden"
           [style.backgroundImage]="p.tileImage ? 'url(' + p.tileImage + ')' : null"
           [style.backgroundSize]="p.tileImage ? 'cover' : null"
           [style.backgroundPosition]="p.tileImage ? 'center' : null">
        <span *ngIf="!p.tileImage">{{p.name}}</span>
      </div>
      <div class="p-4">
        <div class="text-lg font-semibold">{{p.name}}</div>
        <div class="flex gap-2 mt-2 flex-wrap">
          <span class="badge" *ngFor="let t of p.tiers">{{t.name}}: {{t.price | currency:t.currency}}</span>
        </div>
      </div>
    </a>
  </div>
</section>
