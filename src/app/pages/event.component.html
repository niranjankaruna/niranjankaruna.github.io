<section class="event-page">
  <!-- Event Header -->
  <div class="event-header" *ngIf="event">
    <div class="event-hero" *ngIf="event?.tileImage" [ngStyle]="{'background-image': 'url(' + event.tileImage + ')'}">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <h1>{{event?.name}}</h1>
        <p>{{event?.summary}}</p>
      </div>
    </div>
    <div class="event-hero event-hero-fallback" *ngIf="!event?.tileImage">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <h1>{{event?.name}}</h1>
        <p>{{event?.summary}}</p>
      </div>
    </div>
  </div>

  <!-- Packages Section -->
  <div class="packages-section" *ngIf="packages.length > 0">
    <h2 class="section-title">Available Packages</h2>
    <div class="app-grid">
      <article *ngFor="let p of packages" class="app-card" [routerLink]="['/package', p.slug]">
        <div
          class="app-media"
          *ngIf="p.tileImage"
          [ngStyle]="{ 'background-image': 'url(' + p.tileImage + ')' }"
        ></div>
        <div
          class="app-media app-media-fallback"
          *ngIf="!p.tileImage"
        ></div>

        <div class="media-overlay"></div>

        <figcaption class="caption">
          <div class="show-cont">
            <h3 class="media-title">{{ p.name }}</h3>
            <div class="tier-badges">
              <span class="tier-badge" *ngFor="let t of p.tiers">{{t.name}}: {{t.price | currency:t.currency}}</span>
            </div>
            <span class="explore-btn">View Package</span>
          </div>
        </figcaption>

        <span class="after"></span>
      </article>
    </div>
  </div>

  <div class="no-packages" *ngIf="packages.length === 0 && event">
    <p>No packages available for this event type yet.</p>
    <a routerLink="/" class="back-btn">← Back to Events</a>
  </div>
</section>
