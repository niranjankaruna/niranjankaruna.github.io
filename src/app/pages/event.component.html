<section class="space-y-6">
  <h1 class="text-3xl font-bold">{{event?.name}}</h1>
  <p class="text-gray-700">{{event?.summary}}</p>

  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
    <a class="tile block" *ngFor="let p of packages" [routerLink]="['/package', p.slug]">
      <div class="aspect-[16/9] bg-gray-200"></div>
      <div class="p-4">
        <div class="text-lg font-semibold">{{p.name}}</div>
        <div class="flex gap-2 mt-2">
          <span class="badge" *ngFor="let t of p.tiers">{{t.name}}: {{t.price | currency:t.currency}}</span>
        </div>
      </div>
    </a>
  </div>
</section>
