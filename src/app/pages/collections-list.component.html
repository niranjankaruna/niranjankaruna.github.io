<!-- Hero Card (matches event list hero style) -->
<section class="hero" style="background-image: url('/assets/hero-bg.jpg')">
  <div class="media-overlay"></div>
  <span class="after"></span>

  <div class="hero-content">
    <h1>Explore Collections</h1>
    <p>Pick a curated tiered bundle</p>
  </div>

  <!-- Sparkles -->
  <div class="sparkle sparkle-1"></div>
  <div class="sparkle sparkle-3"></div>

  <!-- Soft Glows -->
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
</section>

<section class="app-page">
  <ng-container *ngFor="let group of eventGroups">
    <details class="group-section" open>
      <summary class="group-label">{{ group.eventName }}</summary>

      <div class="group-content">
        <div class="empty-state" *ngIf="!group.collections?.length">
          No collections available yet.
        </div>

        <div class="app-grid" *ngIf="group.collections?.length">
          <article *ngFor="let collection of group.collections" class="app-card" [routerLink]="['/collection', collection.id]">
            <!-- Background image -->
            <div
              class="app-media"
              *ngIf="collection.image"
              [ngStyle]="{ 'background-image': 'url(' + normalizeAssetPath(collection.image) + ')' }"
            ></div>
            <div
              class="app-media app-media-fallback"
              *ngIf="!collection.image"
            ></div>

            <!-- dark overlay on image -->
            <div class="media-overlay"></div>

            <!-- caption -->
            <figcaption class="caption">
              <div class="show-cont">
                <h3 class="media-title">{{ collection.name }}</h3>
                <span class="explore-btn">View</span>
              </div>
            </figcaption>

            <!-- overlay gradient -->
            <span class="after"></span>
          </article>
        </div>
      </div>
    </details>
  </ng-container>
</section>
