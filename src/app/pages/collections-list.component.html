<section class="app-page">
  <div class="app-grid">
    <article *ngFor="let collection of collections" class="app-card" [routerLink]="['/collection', collection.id]">
      <!-- Background image -->
      <div
        class="app-media"
        *ngIf="collection.image"
        [ngStyle]="{ 'background-image': 'url(' + collection.image + ')' }"
      ></div>
      <div
        class="app-media app-media-fallback"
        *ngIf="!collection.image"
      ></div>

      <!-- dark overlay on image -->
      <div class="media-overlay"></div>

      <!-- animated caption -->
      <figcaption class="caption">
        <div class="show-cont">
          <h3 class="media-title">{{ collection.name }}</h3>
          <div class="card-tiers" *ngIf="collection.tiers && collection.tiers.length > 0">
            <span class="tier-badge" *ngFor="let tier of collection.tiers | slice:0:2">
              {{ tier.name }}: {{ tier.price }} {{ tier.currency }}
            </span>
          </div>
          <span class="explore-btn">Explore</span>
        </div>
      </figcaption>

      <!-- overlay gradient -->
      <span class="after"></span>
    </article>
  </div>
</section>
