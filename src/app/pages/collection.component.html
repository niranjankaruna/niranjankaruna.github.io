<ng-container *ngIf="collection as p">
  <section class="product-hero"></section>

  <section class="product-body">
    <!-- Thumbnails Sidebar (Left) -->
      <div class="thumbnails-sidebar" [class.is-empty]="mediaCount <= 1">
      <ng-container *ngIf="mediaCount > 1">
        <!-- Image Thumbnails -->
        <button
          *ngFor="let img of p.images"
          class="thumb"
          type="button"
          [class.active]="img === selectedImage && !showVideo"
          [style.backgroundImage]="getImageUrl(img)"
          (click)="setSelected(img)">
        </button>

        <!-- Video Thumbnails -->
        <button
          *ngFor="let v of p.videos; let i = index"
          class="thumb video-thumb"
          type="button"
          [class.active]="showVideo"
          (click)="playVideo(i)">
          <span class="play-icon">▶</span>
        </button>
      </ng-container>
    </div>

    <!-- Main View (Center) -->
    <div class="main-content">
      <!-- Main Image -->
      <div class="main-media" *ngIf="!showVideo && (selectedImage || p.images?.[0])">
        <img
          class="main-media-img"
          [src]="normalizeAssetPath(selectedImage || p.images?.[0])"
          [alt]="p.name"
          loading="eager" />
      </div>

      <!-- Video Player -->
      <div class="video-container" *ngIf="showVideo && sanitizedVideos.length">
        <iframe
          class="main-video"
          [src]="sanitizedVideos[selectedVideoIndex]"
          allowfullscreen
          frameborder="0">
        </iframe>
      </div>
    </div>

    <!-- Details Column (Right) -->
    <div class="details">
      <h2>{{p.name}}</h2>
      <p class="summary">{{p.summary}}</p>

      <!-- Tiers -->
      <div class="tiers" *ngIf="p.tiers?.length">
        <h3>Tiers</h3>
        <div class="tier-grid">
          <button
            type="button"
            class="tier-btn"
            *ngFor="let t of p.tiers; let i = index"
            [class.active]="i === tierIndex"
            (click)="selectTier(i)">
            {{t.name}}
          </button>
        </div>
      </div>

      <!-- Price -->
      <div class="price-card" *ngIf="selectedTier">
        <div class="amount">{{selectedTier.price | currency:selectedTier.currency}}</div>
        <div class="note">Collection tier price</div>
      </div>

      <!-- Included Items -->
      <div class="included" *ngIf="selectedTier?.resolvedItems?.length">
        <h3>Included Items</h3>
        <ul class="included-list">
          <li class="included-item" *ngFor="let it of selectedTier.resolvedItems">
            <a [routerLink]="['/product', it.product]">{{it.productData?.name || it.product}}</a>
            <span class="included-qty">× {{it.qty || 1}}</span>
          </li>
        </ul>
      </div>
    </div>
  </section>
</ng-container>
