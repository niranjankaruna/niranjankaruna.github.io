<ng-container *ngIf="product as p">
  <!-- Hero section hidden -->
  <section class="product-hero"></section>

  <section class="product-body">
    <!-- Gallery Column -->
    <div class="gallery">
      <!-- Main Image -->
      <div class="main-media" [ngStyle]="{'background-image': mainImage}"></div>

      <!-- Thumbnails -->
      <div class="thumbs" *ngIf="p.images?.length">
        <button
          *ngFor="let img of p.images"
          class="thumb"
          type="button"
          [class.active]="img === selectedImage"
          [ngStyle]="{'background-image': 'url(' + img + ')'}"
          (click)="setSelected(img)"
          [attr.aria-label]="'View image'">
        </button>
      </div>

      <!-- Videos Section -->
      <div class="videos" *ngIf="p.videos?.length">
        <h3>Videos</h3>
        <div class="video-grid">
          <iframe *ngFor="let v of p.videos" class="video" [src]="v" allowfullscreen></iframe>
        </div>
      </div>
    </div>

    <!-- Details Column -->
    <div class="details">
      <!-- Product Name -->
      <h2>{{p.name}}</h2>

      <!-- Description -->
      <p class="summary">{{p.summary || p.seo?.description}}</p>

      <!-- Price Card -->
      <div class="price-card" *ngIf="p.rental">
        <div class="amount">{{p.rental?.price | currency:p.rental?.currency}}</div>
        <div class="note">Standalone rental</div>
      </div>

      <!-- Collections -->
      <div class="collections" *ngIf="usedIn.length">
        <h3>Appears In Collections</h3>
        <ul>
          <li *ngFor="let pkg of usedIn">
            <a [routerLink]="['/collection', pkg.id]">{{pkg.name}}</a>
          </li>
        </ul>
      </div>
    </div>
  </section>
</ng-container>
