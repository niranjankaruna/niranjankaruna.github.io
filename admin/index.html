<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Admin</title>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@3.9.0/dist/decap-cms.js"></script>
    <script>
      // Manual Initialization to ensure config is loaded correctly
      CMS.init({
        config: {
          backend: {
            name: 'github',
            repo: 'niranjankaruna/DecorRentals',
            branch: 'main',
            base_url: 'https://oauth-bridge.niranjankaruna.workers.dev',
            auth_endpoint: '/api/auth'
          },
          load_config_file: false,
          media_folder: "src/assets/uploads",
          public_folder: "/assets/uploads",
          collections: [
            {
              label: "Event Types",
              name: "event_types",
              folder: "content/event-types",
              create: true,
              format: "json",
              slug: "{{slug}}",
              fields: [
                { label: "Name", name: "name", widget: "string" },
                { label: "Slug", name: "slug", widget: "string" },
                { label: "Summary", name: "summary", widget: "text", required: false },
                { label: "Tile Image", name: "tileImage", widget: "image" },
                { label: "Images", name: "images", widget: "list", field: { label: "Image", name: "image", widget: "image" } },
                { label: "Videos (YouTube URLs)", name: "videos", widget: "list", field: { label: "URL", name: "url", widget: "string" } },
                { label: "SEO", name: "seo", widget: "object", fields: [
                    { label: "Title", name: "title", widget: "string", required: false },
                    { label: "Description", name: "description", widget: "text", required: false }
                  ]
                },
                { label: "Status", name: "status", widget: "select", options: ["draft", "published"], default: "published" }
              ]
            },
            {
              label: "Products",
              name: "products",
              folder: "content/products",
              create: true,
              format: "json",
              slug: "{{slug}}",
              fields: [
                { label: "Name", name: "name", widget: "string" },
                { label: "Slug", name: "slug", widget: "string" },
                { label: "SKU", name: "sku", widget: "string", required: false },
                { label: "Category", name: "category", widget: "select", options: ["cake-stands", "backdrop-frames", "cloths", "easel-boards", "garlands", "banners", "balloons", "age-numbers", "lights", "props"] },
                { label: "Dimensions", name: "dimensions", widget: "object", required: false, fields: [
                    { label: "Width", name: "width", widget: "string", required: false },
                    { label: "Height", name: "height", widget: "string", required: false },
                    { label: "Depth", name: "depth", widget: "string", required: false }
                  ]
                },
                { label: "Price", name: "price", widget: "number", value_type: "float" },
                { label: "Currency", name: "currency", widget: "select", options: ["EUR", "USD", "GBP"], default: "EUR" },
                { label: "Image", name: "image", widget: "image" },
                { label: "Description", name: "description", widget: "markdown", required: false },
                { label: "Status", name: "status", widget: "select", options: ["draft", "published"], default: "published" }
              ]
            },
            {
              label: "Packages",
              name: "packages",
              folder: "content/packages",
              create: true,
              format: "json",
              slug: "{{slug}}",
              fields: [
                { label: "Name", name: "name", widget: "string" },
                { label: "Slug", name: "slug", widget: "string" },
                { label: "Summary", name: "summary", widget: "text", required: false },
                { label: "Image", name: "image", widget: "image" },
                { label: "Tiers", name: "tiers", widget: "list", fields: [
                    { label: "Name", name: "name", widget: "string" },
                    { label: "Price", name: "price", widget: "number", value_type: "float" },
                    { label: "Items", name: "items", widget: "list", fields: [
                        { label: "Product Slug", name: "product", widget: "relation", collection: "products", search_fields: ["name", "slug"], value_field: "slug", display_fields: ["name"] },
                        { label: "Quantity", name: "quantity", widget: "number", default: 1 }
                      ]
                    }
                  ]
                },
                { label: "Status", name: "status", widget: "select", options: ["draft", "published"], default: "published" }
              ]
            }
          ]
        }
      });
    </script>
  </body>
</html>
