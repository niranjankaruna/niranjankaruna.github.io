backend:
  name: github
  repo: niranjankaruna/niranjankaruna.github.io
  branch: main
  base_url: https://oauth-bridge.niranjankaruna.workers.dev
  auth_endpoint: /api/auth

editorial_workflow: true

media_folder: src/assets/uploads
public_folder: /assets/uploads

collections:
  - name: event_types
    label: Event Types
    folder: content/event-types
    create: true
    format: json
    identifier_field: id
    fields:
      - { label: Name, name: name, widget: string }
      - { label: ID, name: id, widget: string }
      - { label: Summary, name: summary, widget: text, required: true }
      - { label: Tile Image, name: tileImage, widget: image, required: false }
      - label: Images
        name: images
        widget: list
        required: false
        field: { label: Image, name: image, widget: image }
      - label: Videos
        name: videos
        widget: list
        required: false
        field: { label: URL, name: url, widget: string }
      - { label: Status, name: status, widget: select, options: [draft, published], default: published }
      - label: Used In Collections
        name: collections_using_event
        widget: relation
        collection: collections
        search_fields: [name]
        display_fields: [name]
        value_field: id
        required: false
        multiple: true
        read_only: true

  - name: products
    label: Products
    folder: content/products
    create: true
    format: json
    identifier_field: id
    fields:
      - { label: Name, name: name, widget: string }
      - { label: ID, name: id, widget: string }
      - { label: Description, name: description, widget: string }
      - { label: Category, name: category, widget: select, options: [cake-stands, backdrop-frames, cloths, easel-boards, garlands, banners, balloons, age-numbers, lights, props] }
      - label: Dimensions
        name: dimensions
        widget: object
        collapsed: true
        required: false
        fields:
          - { label: Width, name: width, widget: number, required: false }
          - { label: Height, name: height, widget: number, required: false }
          - { label: Depth, name: depth, widget: number, required: false }
          - { label: Unit, name: unit, widget: select, options: [cm, in], required: false }
      - { label: Color, name: color, widget: string, required: false }
      - label: Rental
        name: rental
        widget: object
        fields:
          - { label: Price, name: price, widget: number, value_type: float, min: 0 }
          - { label: Currency, name: currency, widget: select, options: [EUR, USD, GBP], default: EUR }
      - { label: Tags, name: tags, widget: list, required: false }
      - label: Images
        name: images
        widget: list
        required: false
        field: { label: Image, name: image, widget: image }
      - label: Videos
        name: videos
        widget: list
        required: false
        field: { label: URL, name: url, widget: string }
      - { label: Status, name: status, widget: select, options: [draft, published], default: published }
      - label: Used In Collections
        name: collections_using_product
        widget: relation
        collection: collections
        search_fields: [name]
        display_fields: [name]
        value_field: id
        required: false
        multiple: true
        read_only: true

  - name: collections
    label: Collections
    folder: content/collections
    create: true
    format: json
    identifier_field: id
    fields:
      - { label: Name, name: name, widget: string }
      - { label: ID, name: id, widget: string }
      - label: Event Type
        name: eventType
        widget: relation
        collection: event_types
        search_fields: [name]
        display_fields: [name]
        value_field: id
        required: true
      - { label: Summary, name: summary, widget: text, required: true }
      - label: Images
        name: images
        widget: list
        required: false
        field: { label: Image, name: image, widget: image }
      - label: Videos
        name: videos
        widget: list
        required: false
        field: { label: URL, name: url, widget: string }
      - label: Tiers
        name: tiers
        widget: list
        fields:
          - { label: Tier Name, name: name, widget: select, options: [Silver, Gold, Diamond] }
          - { label: Price, name: price, widget: number, value_type: float, min: 0 }
          - { label: Currency, name: currency, widget: select, options: [EUR, USD, GBP], default: EUR }
          - label: Included Items
            name: items
            widget: list
            fields:
              - label: Product
                name: product
                widget: relation
                collection: products
                search_fields: [name]
                display_fields: [name]
                value_field: id
                required: true
              - { label: Quantity, name: qty, widget: number, min: 1, default: 1 }
              - { label: Notes, name: notes, widget: string, required: false }
      - { label: Status, name: status, widget: select, options: [draft, published], default: published }
