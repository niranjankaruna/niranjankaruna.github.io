# CONTEXT:
# - Decap CMS configuration for Git-based content management
# - All CMS commits go directly to main branch; no editorial workflow
# - OAuth handled by Cloudflare Worker proxy (oauth-bridge)
# - identifier_field: id used for all collections; maps to JSON filename
# - Relation widgets enable dynamic dropdowns without hardcoded values
# - read_only relation fields provide reverse dependency visibility

backend:
  name: github
  repo: decor-rentals/decor-rentals.github.io
  branch: main
  base_url: https://oauth-bridge.decor-rentals.workers.dev
  auth_endpoint: /api/auth

# CONTEXT:
# - media_folder: source location during development (committed to git)
# - public_folder: URL path after build (used in generated JSON)
media_folder: src/assets/uploads
public_folder: /assets/uploads

collections:
  # CONTEXT:
  # - Categories collection minimal; exists only to provide dynamic dropdown for Products
  # - products_using_category is read-only reverse relation for dependency awareness
  - name: categories
    label: Categories
    folder: content/categories
    create: true
    format: json
    identifier_field: id
    fields:
      - { label: Name, name: name, widget: string }
      - { label: ID, name: id, widget: string, pattern: ['^[a-z0-9-]+$', 'ID must be lowercase with no spaces'] }
      - label: Used In Products
        name: products_using_category
        widget: relation
        collection: products
        search_fields: [name]
        display_fields: [name]
        value_field: id
        required: false
        multiple: true
        read_only: true

  # CONTEXT:
  # - Event Types are top-level content; Collections reference them via relation
  # - tileImage separate from images array for explicit list view thumbnail control
  # - Status field enables draft workflow without editorial_workflow feature
  - name: event_types
    label: Event Types
    folder: content/event-types
    create: true
    format: json
    identifier_field: id
    fields:
      - { label: Name, name: name, widget: string }
      - { label: ID, name: id, widget: string, pattern: ['^[a-z0-9-]+$', 'ID must be lowercase with no spaces'] }
      - { label: Summary, name: summary, widget: text, required: true }
      - { label: Tile Image, name: tileImage, widget: image, required: false }
      - { label: Hero Image, name: heroImage, widget: image, required: false }
      - label: Images
        name: images
        widget: list
        required: false
        field: { label: Image, name: image, widget: image }
      - label: Videos
        name: videos
        widget: list
        required: false
        field: { label: URL, name: url, widget: string }
      - { label: Status, name: status, widget: select, options: [draft, published], default: published }
      - label: Used In Collections
        name: collections_using_event
        widget: relation
        collection: collections
        search_fields: [name]
        display_fields: [name]
        value_field: id
        required: false
        multiple: true
        read_only: true

  # CONTEXT:
  # - Products are referenced by Collections via tier items
  # - Category uses relation widget; requires Categories collection to have entries
  # - Dimensions object collapsed by default to reduce form noise
  # - Rental object contains pricing; indexed for list view display
  - name: products
    label: Products
    folder: content/products
    create: true
    format: json
    identifier_field: id
    fields:
      - { label: Name, name: name, widget: string }
      - { label: ID, name: id, widget: string, pattern: ['^[a-z0-9-]+$', 'ID must be lowercase with no spaces'] }
      - { label: Description, name: description, widget: string }
      - label: Category
        name: category
        widget: relation
        collection: categories
        search_fields: [name]
        display_fields: [name]
        value_field: id
        required: true
      - label: Variants
        name: variants
        widget: list
        required: false
        summary: "{{fields.name}}"
        fields:
          - { label: Variant Name, name: name, widget: string, required: false }
          - label: Dimensions
            name: dimensions
            widget: object
            collapsed: true
            required: false
            fields:
              - { label: Length, name: length, widget: string, required: false }
              - { label: Width, name: width, widget: string, required: false }
              - { label: Height, name: height, widget: string, required: false }
              - { label: Unit, name: unit, widget: select, options: [cm, inch, feet], required: false }
          - { label: Color, name: color, widget: string, required: false }
          - label: Rental
            name: rental
            widget: object
            fields:
              - { label: Price, name: price, widget: string, value_type: float, min: 0 }
              - { label: Currency, name: currency, widget: select, options: [EUR, USD, GBP], default: EUR }
      - { label: Tags, name: tags, widget: list, required: false }
      - label: Images
        name: images
        widget: list
        required: false
        field: { label: Image, name: image, widget: image }
      - label: Videos
        name: videos
        widget: list
        required: false
        field: { label: URL, name: url, widget: string }
      - { label: Status, name: status, widget: select, options: [draft, published], default: published }
      - label: Used In Collections
        name: collections_using_product
        widget: relation
        collection: collections
        search_fields: [name]
        display_fields: [name]
        value_field: id
        required: false
        multiple: true
        read_only: true

  # CONTEXT:
  # - Collections (formerly Packages) aggregate Products into tiered pricing bundles
  # - eventType relation links to Event Types; enables filtering by occasion
  # - Tiers widget is nested list with Silver/Gold/Diamond pricing structure
  # - Tier items use relation to products collection; enables search on product name
  # - ContentService.resolveCollection() hydrates tier items with full product data
  - name: collections
    label: Collections
    folder: content/collections
    create: true
    format: json
    identifier_field: id
    fields:
      - { label: Name, name: name, widget: string }
      - { label: ID, name: id, widget: string, pattern: ['^[a-z0-9-]+$', 'ID must be lowercase with no spaces'] }
      - label: Event Type
        name: eventType
        widget: relation
        collection: event_types
        search_fields: [name]
        display_fields: [name]
        value_field: id
        required: true
      - { label: Summary, name: summary, widget: text, required: true }
      - label: Images
        name: images
        widget: list
        required: false
        field: { label: Image, name: image, widget: image }
      - label: Videos
        name: videos
        widget: list
        required: false
        field: { label: URL, name: url, widget: string }
      - label: Tiers
        name: tiers
        widget: list
        fields:
          - { label: Tier Name, name: name, widget: select, options: [Silver, Gold, Diamond] }
          - { label: Price, name: price, widget: string, value_type: float, min: 0 }
          - { label: Currency, name: currency, widget: select, options: [EUR, USD, GBP], default: EUR }
          - label: Included Items
            name: items
            widget: list
            fields:
              - label: Product
                name: product
                widget: relation
                collection: products
                search_fields: [name]
                display_fields: [name]
                value_field: id
                required: true
              - { label: Quantity, name: qty, widget: number, min: 1, default: 1 }
              - { label: Notes, name: notes, widget: string, required: false }
      - { label: Status, name: status, widget: select, options: [draft, published], default: published }
